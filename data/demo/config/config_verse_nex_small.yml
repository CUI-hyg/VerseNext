# CometSpark-V0.2 verse_nex SMALL 配置（沙箱验证用，~0.5M 参数）
# 用途：3 核 CPU / 5GB 内存沙箱下端到端验证 verse_nex 训练路径
# - 4 层 VerseNex（1 MoD + 3 trisparse）
# - d_model=64, n_head=4, n_kv_head=2
# - 与 CometSparkV02Small 工厂函数参数一致

model:
  arch: verse_nex
  vocab_size: 256
  n_layer: 4
  n_head: 4
  n_embd: 64
  seq_len: 128
  dropout: 0.1
  n_kv_head: 2
  tie_weights: true
  # VerseNex 专用字段（small 版本缩减规模）
  layer_pattern: null
  mod_every: 4                    # 每 4 层 1 个 MoD（4 层 → 1 MoD + 3 trisparse）
  num_dense_parts: 2              # 缩减为 2 DensePart
  num_experts_per_part: 2         # 每个 DensePart 2 Expert
  top_k: 1                        # top-1 简化
  window_size: 32
  num_global_tokens: 4
  use_alibi: true
  use_rope: false
  aux_loss_weight: 0.01

training:
  batch_size: 8
  micro_batch: 4
  lr: 0.003
  weight_decay: 0.01
  no_decay: true
  grad_clip: 1.0
  label_smoothing: 0.1
  max_steps: 200
  warmup: 20
  eval_interval: 20
  patience: 5
  grad_accum: 1
  log_interval: 20
  seed: 42
  enable_progress_bar: true
  realtime_plot: true
  eta_window: 20
  parallel_chunks: 1

tokenizer:
  kind: byte
  vocab_size: 259

data:
  train_path: data/train.jsonl
  val_path: data/val.jsonl

checkpoint:
  save_dir: checkpoints_verse_nex_small
