[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "verse-compat"
version = "0.1.0"
description = "VerseCompat: HuggingFace / PyTorch compatibility adapters (optional, used only when installed)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["numpy>=1.26", "verse-torch"]

[tool.setuptools.packages.find]
where = ["."]
include = ["verse_compat*"]
