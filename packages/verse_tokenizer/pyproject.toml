[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "verse-tokenizer"
version = "0.1.0"
description = "VerseTokenizer: Lightweight BPE/Unigram tokenizer (no heavy deps)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["numpy>=1.26"]

[tool.setuptools.packages.find]
where = ["."]
include = ["verse_tokenizer*"]
