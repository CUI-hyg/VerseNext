[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "verse-torch"
version = "0.1.0"
description = "VerseTorch: Pure-Python/NumPy tensor & autograd engine (CPU-first)."
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["numpy>=1.26", "pyyaml>=6.0", "matplotlib>=3.7"]

[project.optional-dependencies]
ui = ["tqdm>=4.66"]
gpu = ["torch>=2.0"]
npu = ["torch>=2.0", "torch_npu"]

[tool.setuptools.packages.find]
where = ["."]
include = ["verse_torch*"]
