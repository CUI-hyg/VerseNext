[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "verse-inference"
version = "0.1.0"
description = "VerseInference: Model loading, state caching, streaming generation."
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["numpy>=1.26", "verse-torch", "verse-nex", "verse-tokenizer"]

[tool.setuptools.packages.find]
where = ["."]
include = ["verse_inference*"]
