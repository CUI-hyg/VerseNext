[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "verse-infra"
version = "0.1.0"
description = "VerseInfra: 总包聚合 verse_tokenizer / verse_compat / verse_inference / verse_trainer。"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.26",
    "verse-torch>=0.1.0",
    "verse-nex>=0.1.0",
]

[project.optional-dependencies]
# verse_compat 需要 PyTorch（可选，仅 HuggingFace 权重加载时）
compat = ["torch>=2.0"]
# verse_trainer CLI 可选依赖
ui = ["tqdm>=4.66", "matplotlib>=3.7"]
yaml = ["pyyaml>=6.0"]

[project.scripts]
verse-train = "verse_infra.verse_trainer.cli:train_main"
verse-finetune = "verse_infra.verse_trainer.cli:finetune_main"
verse-posttrain = "verse_infra.verse_trainer.cli:posttrain_main"
verse-eval = "verse_infra.verse_trainer.cli:eval_main"
verse-tokenize = "verse_infra.verse_trainer.cli:tokenize_main"

[tool.setuptools.packages.find]
where = ["."]
include = ["verse_infra*"]
